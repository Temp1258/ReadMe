<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadMe – Microphone Permission</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5f5;
        color: #333;
      }
      .container {
        text-align: center;
        background: #fff;
        padding: 48px;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 420px;
      }
      h1 { font-size: 22px; margin-bottom: 12px; }
      p { font-size: 15px; color: #666; margin-bottom: 24px; line-height: 1.5; }
      .status { font-size: 14px; color: #999; }
      .status.granted { color: #2e7d32; }
      .status.denied { color: #c62828; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ReadMe needs microphone access</h1>
      <p>Please allow microphone access in the browser prompt above. This page will close automatically once permission is granted.</p>
      <div class="status" id="status">Requesting permission...</div>
    </div>
    <script type="module" src="./mic-permission.ts"></script>
  </body>
</html>
